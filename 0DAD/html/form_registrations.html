<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/form_style.css">
    <title>Document</title>
</head>

<body>

    <div class="form__container">

        <div class="form__left__content">
            <h1>Форма</h1>
            <h2>На обращение</h2>
            <p>Центр "Хирургическая спинальная инфекция"</p>
        </div>
        
        <form action="" method="post" class="form__right__content">

            <div class="form__name">
                <label for="name">ФИО</label>
                <input type="text" name="name" required >
                <input type="text" name="name" required>
                <input type="text" name="name" required>
            </div>

            <div class="form__sex">
                <span>Пол</span>

                <label>
                    <input type="radio" name="sex" value="мужской">мужской
                    
                </label>

                <label>
                    <input type="radio" name="sex" value="женский">женский
                    
                </label>

            </div>

            <div>
                <label for="age">Возраст</label>
                <input type="text" name="age" required>
            </div>

            <div>
                <label for="defect">Противопоказания</label>
                <input type="text" name="defect" required>
            </div>

            <div>
                <span>Лечение</span>

                <label>
                    <input type="radio" name="heal" value="было">было
                    
                </label>

                <label>
                    <input type="radio" name="heal" value="не было">не было
                    
                </label>
            </div>

            <div>
                <label for="hospital">Если было лечение указать больницу</label>
                <input type="text" name="hospital" required>
            </div>

            <button type="submit">Отправить</button> 
        </form>

    </div>
    
</body>

</html>
