<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/form_style.css">
    <title>Хирургический центр</title>
</head>

<body>

    <div class="form__container">

        <div class="form__left__content">
            <h1>Форма</h1>
            <h2>На обращение</h2>
            <p>Центр "Хирургическая спинальная инфекция"</p>
        </div>
        
        <form action="../index.html" method="get" class="form__right__content">

            <div class="form__name">
                <label for="name">ФИО</label>
                <input type="text" name="lastName" id="lastName" required >
                <input type="text" name="firstName" id="firstName" required>
                <input type="text" name="patronymic" id="patronymic" required>
            </div>

            <div class="form__sex">
                <span>Пол</span>

                <select name="gender" id="gender">
                    <option value="мужщина">мужщина</option>
                    <option value="женщина">женщина</option>
                </select>

            </div>

            <div>
                <label for="age">Возраст</label>
                <input type="number" name="age" id="age" required>
            </div>

            <div>
                <label for="contraindications">Противопоказания</label>
                <input type="text" name="contraindications" id="contraindications" required>
            </div>

            <div>
                <span>Лечение</span>
                <input type="text" name="contraindications" id="treatment" required>
                
            </div>

            <div>
                <label for="hospital" >Указать больницу</label>
                <input type="text" name="hospital" id="hospital" required>
            </div>

            <button type="submit" onclick="submit_form();">Отправить</button> 
        </form>
    
    </div>

    <script defer src="../js/post.js"></script>
    
</body>

</html>
